deploy:
  name: 🚀 部署到服务器
  needs: build
  runs-on: ubuntu-latest
  strategy:
    matrix:
      server:
        - name: 'Server-1'
          host_secret: 'HOST'
          username_secret: 'USERNAME'
          ssh_key_secret: 'SSH_PRIVATE_KEY'
          port: 45663
          path: '/opt/1panel/www/sites/www.louaq.com/index'
    fail-fast: false

  steps:
    - name: 📥 下载构建产物
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: 🚚 准备服务器 - ${{ matrix.server.name }}
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets[matrix.server.host_secret] }}
        username: ${{ secrets[matrix.server.username_secret] }}
        key: ${{ secrets[matrix.server.ssh_key_secret] }}
        port: ${{ matrix.server.port }}
        script_stop: true
        script: |
          sudo mkdir -p ${{ matrix.server.path }}
          sudo chown -R root:www-data ${{ matrix.server.path }}
          
          # 只清理临时目录，不清理正式网站目录
          rm -rf /tmp/louaq-dist
          mkdir -p /tmp/louaq-dist

    - name: 📤 上传构建产物到临时目录
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets[matrix.server.host_secret] }}
        username: ${{ secrets[matrix.server.username_secret] }}
        key: ${{ secrets[matrix.server.ssh_key_secret] }}
        port: ${{ matrix.server.port }}
        source: 'dist/*'
        target: /tmp/louaq-dist
        strip_components: 1

    - name: 🔧 增量发布到正式目录
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets[matrix.server.host_secret] }}
        username: ${{ secrets[matrix.server.username_secret] }}
        key: ${{ secrets[matrix.server.ssh_key_secret] }}
        port: ${{ matrix.server.port }}
        script_stop: true
        script: |
          # 确保 Astro 静态资源目录存在
          sudo mkdir -p ${{ matrix.server.path }}/_astro

          # 1. 先同步新的 _astro 资源，不删除旧资源
          if [ -d /tmp/louaq-dist/_astro ]; then
            sudo rsync -av /tmp/louaq-dist/_astro/ ${{ matrix.server.path }}/_astro/
          fi

          # 2. 再同步 HTML 和其他资源，但排除 _astro，避免删除旧 hash 资源
          sudo rsync -av --delete --exclude='_astro/' /tmp/louaq-dist/ ${{ matrix.server.path }}/

          # 3. 清理 30 天以前的旧 Astro 构建资源
          sudo find ${{ matrix.server.path }}/_astro -type f -mtime +30 -delete

          # 4. 设置权限
          sudo chmod -R 755 ${{ matrix.server.path }}
          sudo chown -R root:www-data ${{ matrix.server.path }}

          # 5. 清理临时目录
          rm -rf /tmp/louaq-dist

          echo "✅ ${{ matrix.server.name }} 部署完成！"