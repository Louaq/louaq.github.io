name: 🚀 部署到自有服务器

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-louaq-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 📦 构建项目
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🟢 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: 📦 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 🔨 构建项目
        run: pnpm build:algolia
        env:
          NODE_ENV: production
          PUBLIC_ALGOLIA_APP_ID: ${{ secrets.PUBLIC_ALGOLIA_APP_ID }}
          PUBLIC_ALGOLIA_SEARCH_KEY: ${{ secrets.PUBLIC_ALGOLIA_SEARCH_KEY }}
          PUBLIC_ALGOLIA_INDEX_NAME: ${{ secrets.PUBLIC_ALGOLIA_INDEX_NAME }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
          PUBLIC_MEILISEARCH_HOST: "https://search.louaq.com"
          PUBLIC_MEILISEARCH_SEARCH_KEY: ${{ secrets.PUBLIC_MEILISEARCH_SEARCH_KEY }}
          PUBLIC_MEILISEARCH_INDEX_NAME: ${{ secrets.PUBLIC_MEILISEARCH_INDEX_NAME || 'blog' }}
          MEILISEARCH_HOST: "https://search.louaq.com"
          MEILISEARCH_ADMIN_KEY: ${{ secrets.MEILISEARCH_ADMIN_KEY }}
          MEILISEARCH_INDEX_NAME: ${{ secrets.MEILISEARCH_INDEX_NAME || 'blog' }}

      - name: 💾 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: 🚀 部署到服务器
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        server:
          - name: 'Server-1'
            host_secret: 'HOST'
            username_secret: 'USERNAME'
            ssh_key_secret: 'SSH_PRIVATE_KEY'
            port: 45663
            path: '/opt/1panel/www/sites/www.louaq.com/index'

    steps:
      - name: 📥 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🚚 准备服务器临时目录 - ${{ matrix.server.name }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets[matrix.server.host_secret] }}
          username: ${{ secrets[matrix.server.username_secret] }}
          key: ${{ secrets[matrix.server.ssh_key_secret] }}
          port: ${{ matrix.server.port }}
          script_stop: true
          script: |
            set -e

            SITE_PATH="${{ matrix.server.path }}"
            TEMP_PATH="/tmp/louaq-dist-${{ github.run_id }}"

            echo "📁 创建正式目录：$SITE_PATH"
            sudo mkdir -p "$SITE_PATH"

            echo "🧹 清理本次部署临时目录：$TEMP_PATH"
            rm -rf "$TEMP_PATH"
            mkdir -p "$TEMP_PATH"

            echo "🔐 设置正式目录权限"
            sudo chown -R root:www-data "$SITE_PATH"
            sudo chmod -R 755 "$SITE_PATH"

      - name: 📤 上传构建产物到服务器临时目录 - ${{ matrix.server.name }}
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets[matrix.server.host_secret] }}
          username: ${{ secrets[matrix.server.username_secret] }}
          key: ${{ secrets[matrix.server.ssh_key_secret] }}
          port: ${{ matrix.server.port }}
          source: 'dist/*'
          target: '/tmp/louaq-dist-${{ github.run_id }}'
          strip_components: 1

      - name: 🔧 增量发布到正式目录 - ${{ matrix.server.name }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets[matrix.server.host_secret] }}
          username: ${{ secrets[matrix.server.username_secret] }}
          key: ${{ secrets[matrix.server.ssh_key_secret] }}
          port: ${{ matrix.server.port }}
          script_stop: true
          script: |
            set -e

            SITE_PATH="${{ matrix.server.path }}"
            TEMP_PATH="/tmp/louaq-dist-${{ github.run_id }}"

            echo "🚀 开始增量部署"
            echo "临时目录：$TEMP_PATH"
            echo "正式目录：$SITE_PATH"

            if [ ! -d "$TEMP_PATH" ]; then
              echo "❌ 临时目录不存在：$TEMP_PATH"
              exit 1
            fi

            # 确保 Astro 静态资源目录存在
            sudo mkdir -p "$SITE_PATH/_astro"

            echo "📦 1. 同步新的 /_astro/ 静态资源，但不删除旧 hash 文件"
            if [ -d "$TEMP_PATH/_astro" ]; then
              sudo rsync -av "$TEMP_PATH/_astro/" "$SITE_PATH/_astro/"
            else
              echo "⚠️ 未发现 $TEMP_PATH/_astro，跳过 _astro 同步"
            fi

            echo "📄 2. 同步 HTML 和其他资源，排除 /_astro/"
            sudo rsync -av --delete \
              --exclude="_astro/" \
              "$TEMP_PATH/" "$SITE_PATH/"

            echo "🧹 3. 清理 30 天以前的旧 /_astro/ 资源"
            if [ -d "$SITE_PATH/_astro" ]; then
              sudo find "$SITE_PATH/_astro" -type f -mtime +30 -delete
            fi

            echo "🔐 4. 设置权限"
            sudo chmod -R 755 "$SITE_PATH"
            sudo chown -R root:www-data "$SITE_PATH"

            echo "🧹 5. 清理临时目录"
            rm -rf "$TEMP_PATH"

            echo "✅ ${{ matrix.server.name }} 部署完成"

      - name: ❌ 部署失败处理 - ${{ matrix.server.name }}
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets[matrix.server.host_secret] }}
          username: ${{ secrets[matrix.server.username_secret] }}
          key: ${{ secrets[matrix.server.ssh_key_secret] }}
          port: ${{ matrix.server.port }}
          script: |
            echo "❌ ${{ matrix.server.name }} 部署失败，清理临时目录..."
            rm -rf "/tmp/louaq-dist-${{ github.run_id }}"
            echo "⚠️ 请检查部署日志并手动处理"

  purge_cache:
    name: 🧹 清除 EdgeOne CDN 缓存
    needs: deploy
    runs-on: ubuntu-latest
    if: needs.deploy.result == 'success'

    steps:
      - name: 🧹 清除 EdgeOne 全站缓存
        run: |
          set -e

          pip install tccli -q

          tccli configure set secretId "${{ secrets.TENCENT_SECRET_ID }}"
          tccli configure set secretKey "${{ secrets.TENCENT_SECRET_KEY }}"
          tccli configure set region "ap-guangzhou"

          tccli teo CreatePurgeTask \
            --ZoneId "${{ secrets.EDGEONE_ZONE_ID }}" \
            --Type "purge_all"

          echo "✅ EdgeOne CDN 全站缓存已清除"

  notify:
    name: 📢 部署结果通知
    needs: [deploy, purge_cache]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 🎉 部署成功通知
        if: needs.deploy.result == 'success' && needs.purge_cache.result == 'success'
        run: |
          echo "🎉 网站已成功部署，EdgeOne CDN 缓存已清除！"

      - name: ⚠️ 部署成功但缓存清理失败
        if: needs.deploy.result == 'success' && needs.purge_cache.result == 'failure'
        run: |
          echo "⚠️ 网站已部署成功，但 EdgeOne CDN 缓存清理失败，请手动刷新缓存。"

      - name: ❌ 部署失败通知
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ 网站部署失败，请检查 deploy job 日志。"